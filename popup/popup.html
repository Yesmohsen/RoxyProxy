<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <title>RoxyProxy</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <div id="mainView" class="view active">
      <div class="header">
        <button class="power-btn" id="powerBtn" aria-label="Toggle proxy connection">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
            <line x1="12" y1="2" x2="12" y2="12"/>
          </svg>
        </button>
        <div class="header-text">
          <span class="status-text" id="statusText">Disconnected</span>
          <span class="timer" id="timer">00:00:00</span>
        </div>
        <div class="stats" id="stats">
        <div class="stat up">
          <span class="stat-arrow">↑</span>
          <span class="stat-value" id="uploadValue">0 B</span>
        </div>
        <div class="stat down">
          <span class="stat-arrow">↓</span>
          <span class="stat-value" id="downloadValue">0 B</span>
        </div>
      </div>
      </div>

      <div class="profile-card" id="profileCard">
        <div class="profile-row top-row">
          <span class="profile-name" id="profileName">No Profile</span>
        </div>
        <div class="profile-row">
          <span class="profile-ip" id="profileIp">-</span>
        </div>
        <div class="profile-row conn-ip-row" id="connIpRow" style="display:none">
          <span class="conn-ip-label">My IP</span>
          <span class="profile-ip" id="connIp" data-blurred="true">-</span>
          <button class="eye-btn" id="eyeToggle" aria-label="Toggle IP visibility">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="profile-row protocols-row" id="protocolsRow">
          <span class="protocol-badge" data-proto="http">HTTP</span>
          <span class="protocol-badge" data-proto="https">HTTPS</span>
          <span class="protocol-badge" data-proto="socks4">SOCKS4</span>
          <span class="protocol-badge" data-proto="socks5">SOCKS5</span>
        </div>
      </div>

      <div class="action-bar">
        <button class="action-btn" id="addBypassBtn" title="Add tab URL to bypass list" aria-label="Add tab URL to bypass list">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="9"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </button>
        <button class="action-btn" id="addWildcardBtn" title="Add wildcard to bypass list" aria-label="Add wildcard to bypass list">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M8.5 8.5l7 7M15.5 8.5l-7 7"/>
          </svg>
        </button>
        <button class="action-btn" id="logsBtn" title="Logs" aria-label="Toggle logs panel">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </button>
        <button class="action-btn" id="backupBtn" title="Backup" aria-label="Toggle backup panel">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
      </div>

      <div class="panels" id="panels">
        <div class="panel" id="bypassPanel">
          <div class="panel-header">
            <span>Bypass List</span>
            <span class="panel-count" id="bypassCount">0</span>
          </div>
          <div class="panel-body" id="bypassList"></div>
        </div>

        <div class="panel" id="logsPanel">
          <div class="panel-header">
            <span>Logs</span>
            <span class="panel-count" id="logsCount">0</span>
          </div>
          <div class="logs-header-row">
            <span>Time</span>
            <span>Method</span>
            <span>Type</span>
            <span>URL</span>
          </div>
          <div class="panel-body" id="logsList"></div>
          <div class="logs-actions">
            <button class="action-btn sm" id="clearLogsBtn">Clear</button>
            <button class="action-btn sm" id="copyLogsBtn">Copy All</button>
          </div>
        </div>

        <div class="panel" id="backupPanel">
          <div class="panel-header">
            <span>Backup Settings</span>
          </div>
          <div class="backup-form">
            <label class="backup-label">Gist ID</label>
            <input type="text" class="backup-input" id="gistIdInput" placeholder="Enter GitHub Gist ID">
            <label class="backup-label">Classic Token</label>
            <input type="password" class="backup-input" id="tokenInput" placeholder="ghp_...">
            <label class="backup-checkbox-row">
              <input type="checkbox" id="autoBackupToggle">
              <span>Auto Backup</span>
            </label>
            <div class="backup-buttons">
              <button class="action-btn sm" id="restoreBtn">Restore</button>
              <button class="action-btn sm primary" id="backupNowBtn">Backup Now</button>
            </div>
            <span class="backup-status" id="backupStatus"></span>
          </div>
        </div>
      </div>
    </div>

    <div id="proxyEditView" class="view">
      <div class="view-header">
        <button class="icon-btn" id="backToMainBtn" aria-label="Back to main view">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
        </button>
        <span id="proxyEditTitle">Add Proxy</span>
      </div>

      <div class="form">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" class="form-input" id="proxyNameInput" placeholder="My Proxy">
        </div>
        <div class="form-group">
          <label class="form-label">IP Address</label>
          <input type="text" class="form-input" id="proxyHostInput" placeholder="192.168.1.20">
        </div>
        <div class="form-group">
          <label class="form-label">Port</label>
          <input type="number" class="form-input" id="proxyPortInput" placeholder="8080" min="1" max="65535">
        </div>
        <div class="form-group">
          <label class="form-label">Protocol</label>
          <div class="proto-checkboxes" id="protoCheckboxes">
            <label class="proto-check">
              <input type="radio" name="protocol" value="http" checked>
              <span>HTTP</span>
            </label>
            <label class="proto-check">
              <input type="radio" name="protocol" value="https">
              <span>HTTPS</span>
            </label>
            <label class="proto-check">
              <input type="radio" name="protocol" value="socks4">
              <span>SOCKS4</span>
            </label>
            <label class="proto-check">
              <input type="radio" name="protocol" value="socks5">
              <span>SOCKS5</span>
            </label>
          </div>
        </div>
        <input type="hidden" id="editProfileId">
        <span class="form-status" id="formStatus"></span>
        <div class="form-actions">
          <button class="action-btn sm danger" id="deleteProfileBtn" style="display:none">Delete</button>
          <button class="action-btn sm primary" id="saveProfileBtn">Save</button>
        </div>
        <div class="profile-selector">
          <label class="form-label">Saved Profiles</label>
          <div id="profileList" class="profile-list"></div>
        </div>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
