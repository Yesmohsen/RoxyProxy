name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          TAG=${GITHUB_REF_NAME}
          zip -r "roxyproxy-${TAG}.zip" \
            manifest.json \
            background/ \
            icons/ \
            popup/ \
            LICENSE \
            README.md

      - name: Generate release notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            cp RELEASE_NOTES.md body.md
          else
            PREV_TAG=$(git tag --sort=-version:refname | head -n 2 | tail -n 1)
            {
              echo "## Changes in ${GITHUB_REF_NAME}"
              echo ""
              git log --oneline --no-decorate ${PREV_TAG}..HEAD 2>/dev/null || echo "Initial release"
            } > body.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: roxyproxy-*.zip
          body_path: body.md
